substitutions:
  _REGION: us-central1
  _VENUE_ID: stadium-001
  _ENVIRONMENT: dev

steps:
  - id: build-crowd-flow
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/crowd-flow:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/crowd-flow:latest
      - services/crowd-flow
    waitFor: ["-"]

  - id: build-queue-predictor
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/queue-predictor:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/queue-predictor:latest
      - services/queue-predictor
    waitFor: ["-"]

  - id: build-navigation
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/navigation:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/navigation:latest
      - services/navigation
    waitFor: ["-"]

  - id: build-order-deliver
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/order-deliver:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/order-deliver:latest
      - services/order-deliver
    waitFor: ["-"]

  - id: build-notification
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/notification:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/notification:latest
      - services/notification
    waitFor: ["-"]

  - id: build-incident-manager
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/incident-manager:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/incident-manager:latest
      - services/incident-manager
    waitFor: ["-"]

  - id: build-gate-entry
    name: "gcr.io/cloud-builders/docker"
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/gate-entry:$SHORT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/gate-entry:latest
      - services/gate-entry
    waitFor: ["-"]

  - id: push-images
    name: "gcr.io/cloud-builders/docker"
    entrypoint: bash
    args:
      - -c
      - |
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/crowd-flow:$SHORT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/crowd-flow:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/queue-predictor:$SHORT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/queue-predictor:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/navigation:$SHORT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/navigation:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/order-deliver:$SHORT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/order-deliver:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/notification:$SHORT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/notification:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/incident-manager:$SHORT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/incident-manager:latest
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/gate-entry:$SHORT_SHA
        docker push ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/gate-entry:latest
    waitFor:
      - build-crowd-flow
      - build-queue-predictor
      - build-navigation
      - build-order-deliver
      - build-notification
      - build-incident-manager
      - build-gate-entry

  - id: deploy-crowd-flow
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_VENUE_ID}-crowdflow \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/crowd-flow:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --port=8080 \
          --memory=512Mi \
          --cpu=2 \
          --min-instances=0 \
          --max-instances=100 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,VENUE_ID=${_VENUE_ID},ENVIRONMENT=${_ENVIRONMENT}" \
          --no-allow-unauthenticated \
          --quiet
    waitFor: ["push-images"]

  - id: deploy-queue-predictor
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_VENUE_ID}-queuepredictor \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/queue-predictor:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --port=8081 \
          --memory=1Gi \
          --cpu=4 \
          --min-instances=0 \
          --max-instances=50 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,VENUE_ID=${_VENUE_ID},ENVIRONMENT=${_ENVIRONMENT}" \
          --no-allow-unauthenticated \
          --quiet
    waitFor: ["push-images"]

  - id: deploy-navigation
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_VENUE_ID}-navigation \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/navigation:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --port=8082 \
          --memory=256Mi \
          --cpu=2 \
          --min-instances=0 \
          --max-instances=100 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,VENUE_ID=${_VENUE_ID},ENVIRONMENT=${_ENVIRONMENT}" \
          --no-allow-unauthenticated \
          --quiet
    waitFor: ["push-images"]

  - id: deploy-order-deliver
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_VENUE_ID}-orderdeliver \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/order-deliver:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --port=8083 \
          --memory=512Mi \
          --cpu=2 \
          --min-instances=0 \
          --max-instances=100 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,VENUE_ID=${_VENUE_ID},ENVIRONMENT=${_ENVIRONMENT}" \
          --no-allow-unauthenticated \
          --quiet
    waitFor: ["push-images"]

  - id: deploy-notification
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_VENUE_ID}-notification \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/notification:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --port=8084 \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=50 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,VENUE_ID=${_VENUE_ID},ENVIRONMENT=${_ENVIRONMENT}" \
          --no-allow-unauthenticated \
          --quiet
    waitFor: ["push-images"]

  - id: deploy-incident-manager
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_VENUE_ID}-incidentmanager \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/incident-manager:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --port=8085 \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=50 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,VENUE_ID=${_VENUE_ID},ENVIRONMENT=${_ENVIRONMENT}" \
          --no-allow-unauthenticated \
          --quiet
    waitFor: ["push-images"]

  - id: deploy-gate-entry
    name: "gcr.io/cloud-builders/gcloud"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy ${_VENUE_ID}-gateentry \
          --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/gate-entry:$SHORT_SHA \
          --region=${_REGION} \
          --platform=managed \
          --port=8086 \
          --memory=256Mi \
          --cpu=2 \
          --min-instances=0 \
          --max-instances=100 \
          --set-env-vars="GCP_PROJECT_ID=$PROJECT_ID,VENUE_ID=${_VENUE_ID},ENVIRONMENT=${_ENVIRONMENT}" \
          --no-allow-unauthenticated \
          --quiet
    waitFor: ["push-images"]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/crowd-flow:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/queue-predictor:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/navigation:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/order-deliver:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/notification:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/incident-manager:$SHORT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/ssep-images/gate-entry:$SHORT_SHA

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
  substitution_option: ALLOW_LOOSE

timeout: 1200s
